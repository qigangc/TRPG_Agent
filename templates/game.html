{% extends "base.html" %}
{% block title %}冒险 - TRPG Agent{% endblock %}
{% block content %}
<div id="scene-bar"></div>
<div style="display:flex;gap:20px;">
  <div style="flex:3;">
    <div id="chat-log" class="chat-log"></div>
    <div id="quick-actions" class="quick-actions"></div>
    <div id="dice-area" class="dice-area" style="display:none;">
      <div id="dice-prompt" class="dice-prompt"></div>
      <div class="dice-controls">
        <button id="inspiration-dice-btn" class="btn btn-secondary" type="button">使用激励骰</button>
        <button id="roll-dice-btn" class="btn btn-primary" type="button">投骰子</button>
        <button id="skip-check-btn" class="btn btn-danger" type="button">跳过检定</button>
      </div>
      <div id="dice-result" class="dice-result" style="display:none;"></div>
    </div>
    <div style="display:flex;gap:8px;">
      <input id="user-input" class="form-input" type="text" placeholder="描述你想做的事..." style="flex:1;" />
      <button id="send-btn" class="btn btn-primary">发送</button>
    </div>
  </div>
  <div style="flex:1;">
    <div id="character-card"></div>
    <div style="margin-top:16px;">
      <button id="save-game-btn" class="btn btn-secondary">保存游戏</button>
      <button id="exit-game-btn" class="btn btn-danger" style="margin-top:8px;">退出游戏</button>
      <div id="save-status"></div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}<script type="module" src="/static/game.js"></script>{% endblock %}
