{% extends "base.html" %}
{% block title %}创建角色 - TRPG Agent{% endblock %}
{% block content %}
<h1>创建角色</h1>
<section>
  <h2>快速预设</h2>
  <p>点击预设卡片自动填入角色信息</p>
  <div id="presets" class="card-grid"></div>
</section>
<hr>
<section>
  <h2>自定义角色</h2>
  <p>分配20点（每点属性超过10消耗1点）</p>
  <div class="form-row">
    <label class="form-label" for="char-name">角色名</label>
    <input id="char-name" class="form-input" type="text" placeholder="输入角色名..." />
  </div>
  <div id="attr-sliders"></div>
  <div class="form-row">
    <label class="form-label" for="char-bg">背景故事（可选）</label>
    <textarea id="char-bg" class="form-textarea" placeholder="讲述你的故事..."></textarea>
  </div>
  <div id="points-display">剩余属性点: <span id="points-left">20</span></div>
  <button id="create-btn" class="btn btn-primary">创建角色并开始冒险</button>
  <div id="create-status"></div>
</section>
{% endblock %}
{% block scripts %}<script type="module" src="/static/character.js"></script>{% endblock %}
